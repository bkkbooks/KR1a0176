body:
  text: 周易上經乾初九潛龍勿用下言初則上有末義故大過曰棟橈本末弱是上有末義六言上則初當言下故小象曰潛龍勿用陽在下也則是初有下義互文相通孔頴達正義彖曰彖斷也斷定一卦之義所以名為彖也正義引褚氏莊氏大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命大哉乾元萬物資始乃統天者此三句總釋乾與元也乾是卦名元是卦德之首故以元德配乾釋之大哉乾元者陽氣昊天乾體廣遠又以元大始生萬物故曰大哉乾元萬物資始者釋其乾元稱大之義以萬象之物皆資取乾元而各得始生不失其宜所以稱大也乃統天者以其至健而為物始以此乃能統領於天天是有形之物以其至健能總括有形是乾元之德也雲行雨施品物流形者此二句釋亨之德也言乾能用天之德使雲氣流行雨澤施布故品類之物流布成形各得亨通无所壅蔽是其亨也大明終始六位時成者此二句總結乾卦之德也以乾之為德大明曉乎萬物終始之道始則潛伏終則飛躍可潛則潛可飛則飛是明達乎始終之道故六爻之位依時而成若其不明終始之道應潛而飛應飛而潛應生而殺應殺而生六位不以時成也時乘六龍以御天者此二句申明乾元乃統天之義言乾之為德以依時乘駕六爻之陽氣以控御於天體六龍即六位之龍也以所居上下言之謂之六位也陽氣升降謂之六龍也上文以至健元始總明乾德故云乃統天也此各乘駕六龍各分其事故云以御天也乾道變化各正性命者此二句更申明乾元資始之義道體无形自然使物開道謂之為道言乾卦之道自然通物故云乾道也變謂後來改前以漸移改謂之變也化謂一有一无忽然而改謂之為化言乾之為道使物漸變者使物卒化者各能正定物之性命者天生之質若剛柔遲速之別命者人所稟受若貴賤夭壽之屬是也正義用莊氏之說彖凡十有二體彖者發首則歎美卦者則此乾彖云大哉乾元坤卦彖云至哉坤元以乾坤德大故先歎美之乃後詳說其義或有先疊文解義而後歎者則豫卦歎云豫之時義大矣哉之類是也或有先釋卦名之義復以卦名結之者則同人彖曰柔得位得中而應乎乾曰同人大有彖曰柔得尊位大中而上下應之曰大有之例是也或有特疊卦名而稱其卦者則同人彖曰同人曰同人于野亨注云同人于野亨利涉大川非二之所能也是乾之所行故特曰同人曰同上文言曰文謂文飾以乾坤德大故特文飾以為文言元者善之長也亨者嘉之會也利者義之和也貞者事之幹也第一節元者善之長者謂天之體性生養物善之大者莫善施生元為施生之宗故言元者善之長也亨者嘉之會者嘉美也言天能通暢萬物使物嘉美之會聚故云嘉之會也利者義之和者言天能利益庶物使物各得其宜而和同也貞者事之幹者言天能以中正之氣成就萬物使物皆得幹濟知至至之注處一體之極極即至也三在下卦之上是至極夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而況於人乎況於鬼神乎與天地合其德者謂覆載也與日月合其明者謂照臨也與四時合其序者若賞以春夏刑以秋冬之類也與鬼神合其吉凶者若福善禍淫也先天而天弗違者若在天時之先行事天乃在後不違是天合大人也後天而奉天時者若在天時之後行事奉順上天是大人合天也天且弗違而況於人乎況於鬼神乎者夫子以天且弗違遂明大人之德言尊而違者尚不違況小而近者可有違乎況於人乎況於鬼神乎知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡不而不失其正者其唯聖人乎進退據心存亡據身得喪據位其唯聖人乎知進退存亡者言唯聖人乃能知進退存亡也何不云得喪者得喪輕於存亡舉重略輕也而不失其正者其唯聖人乎者聖人非但只知進退存亡又能不失其正道其唯聖人乎並同上坤夫玄黃者天地之雜也天玄而地黃上六之父兼有天地雜氣所以上六被傷其血玄黃也天色玄地色黃故血有天地之色正義師六五田有禽利執言長子帥師弟子輿尸凶長子謂九二德長於人弟子謂六三德劣於物正義大有其德剛健而文明應乎天而時行是以元亨六五應乾九二亦與五為體故云應乎天也德應於天則行不失時與時无違雖萬物皆得亨通故云是以元亨正義引褚氏莊氏豫利建侯行師建侯即元亨也行師即利貞也正義復七日來復五月一陰生至十一月一陽生凡七月而云七日不云月者欲見陽長須速故變月言日正義引褚氏莊氏恒亨无咎利貞注恒而亨以濟三事也三事者无咎一也利二也貞三也正義大壯六五喪羊于易无悔經止一言喪言而注為兩處分用初云必喪其羊失其所居是自然應失後云能喪壯于易不於險難故得无咎自能喪其羊二理自為矛盾正義明夷六二明夷夷干左股用拯馬壯吉言左者取其傷小則比夷右未為切也夷千左股明避難不壯不為闇王所疑猶得處位不至懷懼而行然後徐徐用馬以自拯濟而獲其壯吉也故曰用拯馬壯吉正義損有孚元吉无咎可貞若行損有咎則須補過以正其失今行損用信則是无咎可正故云无咎利貞正義姤剛遇中正天下大行也一女而遇五男既不可取天地匹配則能成品物由是言之若剛遇中正之男柔得幽貞之女則天下人倫之化乃得大行也正義易有四象四象謂六十四卦有實象有假象有義象有用象為四象也正義周易繫辭下為九章第一起八卦成列至非曰義第二起古者包犧至蓋取諸夫第三起易者象也至德之盛第四起困于石至勿恒凶第五起乾坤其易之門至失得之報第六起易之興至巽以行權第七起易之為書至思過半矣第八起二與四至謂易之道第九起夫乾天下至其辭屈正義云周氏莊氏並為九章今從九章為說也云云
